services:
  - type: web
    name: warhex-arena-pro
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: warhex-db
          property: connectionString
databases:
  - name: warhex-db
    plan: free
